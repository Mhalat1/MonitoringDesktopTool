# CHAPITRE 4 — Secret : données sensibles
#
# Si tu ajoutes une API key ou un mot de passe dans Monitor,
# ils vont ici — jamais en clair dans le code Java ou dans Git.
#
# IMPORTANT : ne commit jamais ce fichier avec de vraies valeurs.
# En prod : utilise Vault, SealedSecrets, ou les secrets CI/CD GitLab.
#
# kubectl apply -f 3-secret.yml

apiVersion: v1
kind: Secret
metadata:
  name: monitor-secrets
  namespace: airbus-monitor
type: Opaque
stringData:
  # K8s encode automatiquement en base64
  API_KEY: "airbus-monitor-key-changeme"
