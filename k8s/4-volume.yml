# CHAPITRE 4 — Volume : persistance des données
#
# Ton Moniteur.scanner() lit des fichiers depuis un chemin local.
# En K8s, les conteneurs sont éphémères : si le Pod redémarre, les
# données disparaissent. Ce PVC réserve un stockage persistant monté
# sur /opt/data — le chemin que ConfigMap injecte dans SCAN_PATH.
#
# kubectl apply -f 4-volume.yml

apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: monitor-data
  namespace: airbus-monitor
spec:
  accessModes:
    - ReadWriteOnce  # un seul Pod lit/écrit à la fois
  resources:
    requests:
      storage: 5Gi   # ajuste selon le volume de fichiers à scanner
