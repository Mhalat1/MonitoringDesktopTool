# CHAPITRE 3 — Deployment : gère les Pods automatiquement
#
# C'est le fichier le plus important.
# Il dit à K8s : "maintiens toujours 3 instances de Monitor en vie".
# Si un Pod tombe → K8s en recrée un (self-healing).
# Si tu changes l'image → K8s fait un rolling update sans downtime.
#
# Lien avec ton code Java :
#   - MonitorApplication.main() démarre Tomcat sur le port 8080
#   - containerPort: 8080 correspond à ce port
#   - envFrom injecte SERVER_PORT et SCAN_PATH depuis ConfigMap
#     → Spring Boot les lit comme variables d'environnement
#   - Le volume monte /opt/data = le dossier que ton Moniteur.scanner() va lire
#
# kubectl apply -f 5-deployment.yml

apiVersion: apps/v1
kind: Deployment
metadata:
  name: monitor-deployment
  namespace: airbus-monitor
spec:
  replicas: 3         # 3 instances de MonitorApplication en parallèle
  selector:
    matchLabels:
      app: monitor    # relie ce Deployment aux Pods labellisés app=monitor
  template:
    metadata:
      labels:
        app: monitor
    spec:
      containers:
        - name: monitor
          # Remplace par ton image Docker réelle après le build
          image: airbus/monitor:1.0.0
          ports:
            - containerPort: 8080   # Tomcat (SpringApplication.run)

          # Injecte ConfigMap comme variables d'environnement
          # Spring Boot lit SERVER_PORT, SCAN_PATH, LOG_LEVEL automatiquement
          envFrom:
            - configMapRef:
                name: monitor-config

          # Injecte le Secret séparément
          env:
            - name: API_KEY
              valueFrom:
                secretKeyRef:
                  name: monitor-secrets
                  key: API_KEY

          # Limites de ressources pour ton app Spring Boot
          resources:
            requests:
              memory: "256Mi"   # Spring Boot démarre avec ~200Mo min
              cpu: "250m"       # 0.25 CPU garanti
            limits:
              memory: "512Mi"   # plafond mémoire
              cpu: "500m"       # plafond CPU

          # Healthcheck : K8s appelle /api/fichiers pour savoir si le Pod est prêt
          readinessProbe:
            httpGet:
              path: /api/fichiers
              port: 8080
            initialDelaySeconds: 30   # Spring Boot prend ~20s à démarrer
            periodSeconds: 10

          livenessProbe:
            httpGet:
              path: /api/fichiers
              port: 8080
            initialDelaySeconds: 60
            periodSeconds: 30

          # Monte le volume sur /opt/data (= valeur de SCAN_PATH dans ConfigMap)
          # Ton Moniteur.scanner(SCAN_PATH) va lire les fichiers depuis là
          volumeMounts:
            - name: data
              mountPath: /opt/data

      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: monitor-data
